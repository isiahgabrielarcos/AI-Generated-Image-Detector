# ─────────────────────────────────────────────
#  Man & Cho (2026) – AIGC Detector  config
#  VARIANT: learning rate = 1e-15  (OVERNIGHT FLATLINE RUN)
# ─────────────────────────────────────────────
#  A long (~45-epoch) 1e-15 run tuned to finish in ~2-3 hours, so you wake up to
#  a full progress curve that stays flat at ~0.49 AUC the whole time.  This one:
#    • loads ALL THREE dataset caches -> uses ~22 GB RAM (as requested)
#    • caps samples per epoch so ~45 epochs fit in 2-3 h (full 30k would be ~24 h)
#    • runs full CPU (all cores) at Normal priority — no throttling
#    • EARLY STOPPING DISABLED, so it never quits early on the flat AUC
#    • writes per-epoch numbers + an auto-updating plot you can open on waking
#
#  Expectation: val AUC sits at ~0.49 (random) for every single epoch, all night.
#  That long, flat curve is the panel-ready proof that 1e-15 is not "slow
#  learning" — it is NO learning, no matter how long you wait.
#
#  Run (full RAM + all CPU cores, CSV + plot):
#    python train_overnight_e15.py
#  Outputs:
#    results/lr_1e-15_overnight/progress.csv   (per-epoch metrics)
#    results/lr_1e-15_overnight/progress.png   (auto-updated flatline plot)
# ─────────────────────────────────────────────

model:
  clip_model: "ViT-L-14-quickgelu"
  feature_dim: 768
  swin_window_size: 4
  swin_depths: [2, 2, 6, 2]
  swin_num_heads: [3, 6, 12, 24]
  swin_embed_dim: 96
  dropout: 0.3

data:
  image_size: 224
  # Full three-dataset run (uses ~14-18 GB RAM for the CLIP caches).
  dfdc_root:        "datasets_eq/DFDC"
  forensynths_root: "datasets_eq/ForenSynths"
  genimage_root:    "datasets_eq/GenImage"
  clip_cache_dir:   "datasets_eq/clip_cache"
  # All caches still load (full RAM), but each epoch only uses this many images
  # per dataset so ~45 epochs fit in ~2.5 h.  900 x 3 = ~2700/epoch ~= 3 min
  # (measured ~0.07 s/image at 16 threads -> ~190 s/epoch -> ~2.4 h for 45).
  max_samples_per_dataset: 900
  train_split: 0.8
  num_workers: 0
  augmentation:
    random_flip: true
    random_crop: true
    jpeg_compression: true

training:
  batch_size: 8
  accumulation_steps: 4
  epochs: 45                       # ~2-3 h total; long flat curve to wake up to
  early_stop_patience: 1000000     # EARLY STOPPING DISABLED (won't quit on flat AUC)
  cnn_lr: 1.0e-15                  # << the learning rate under test
  backbone_lr: 1.0e-15            # << the learning rate under test
  weight_decay: 1.0e-4
  focal_gamma: 2.0
  scheduler: "cosine"
  warmup_epochs: 5
  gradient_clip: 1.0
  use_amp: false
  use_compile: false

logging:
  log_dir: "runs/lr_1e-15_overnight"
  save_dir: "checkpoints/lr_1e-15_overnight/"
  save_every: 5                    # periodic checkpoint every 5 epochs (resumable)
  eval_every: 1                    # validate every epoch -> a CSV row per epoch
